[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "MITNFA",     # added because hex_lit (transitive via bitcoin v0.32 -> miniscript) requires it
]
# bitcoin-encrypted-backup has no license field in its Cargo.toml (git dep)
[[licenses.exceptions]]
name = "bitcoin-encrypted-backup"
allow = ["MIT"]  # upstream repo has MIT license in LICENSE file

[bans]
multiple-versions = "warn"
# git deps with rev= pin and path deps are flagged as "wildcards" by cargo-deny;
# allow them explicitly so the bans section only catches true registry wildcards
wildcards = "allow"
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
    { name = "async-hwi" },
]

[sources]
unknown-registry = "deny"
unknown-git = "allow"
allow-git = [
    "https://github.com/pythcoiner/encrypted_backup",
]
